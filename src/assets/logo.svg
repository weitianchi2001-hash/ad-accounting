<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 240">
  <defs>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f59e0b"/>
      <stop offset="50%" style="stop-color:#d97706"/>
      <stop offset="100%" style="stop-color:#b45309"/>
    </linearGradient>
    <linearGradient id="bar1" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#22c55e"/>
      <stop offset="100%" style="stop-color:#4ade80"/>
    </linearGradient>
    <linearGradient id="bar2" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#3b82f6"/>
      <stop offset="100%" style="stop-color:#60a5fa"/>
    </linearGradient>
    <linearGradient id="bar3" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#7c3aed"/>
      <stop offset="100%" style="stop-color:#a78bfa"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.15"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect x="0" y="0" width="240" height="240" rx="36" fill="#0f172a"/>

  <!-- Decorative grid dots -->
  <g opacity="0.06">
    <circle cx="40" cy="40" r="1.5" fill="white"/>
    <circle cx="80" cy="40" r="1.5" fill="white"/>
    <circle cx="120" cy="40" r="1.5" fill="white"/>
    <circle cx="160" cy="40" r="1.5" fill="white"/>
    <circle cx="200" cy="40" r="1.5" fill="white"/>
    <circle cx="40" cy="80" r="1.5" fill="white"/>
    <circle cx="40" cy="120" r="1.5" fill="white"/>
    <circle cx="40" cy="160" r="1.5" fill="white"/>
    <circle cx="40" cy="200" r="1.5" fill="white"/>
  </g>

  <!-- Coin / token -->
  <g filter="url(#shadow)">
    <circle cx="85" cy="100" r="35" fill="url(#gold)" stroke="#fef3c7" stroke-width="2.5"/>
    <circle cx="85" cy="100" r="22" fill="none" stroke="#fef3c7" stroke-width="1" opacity="0.6"/>
    <!-- ¥ symbol on coin -->
    <text x="85" y="108" text-anchor="middle" fill="#fef3c7" font-size="22" font-weight="900" font-family="serif">¥</text>
  </g>

  <!-- Growth bars (representing profit/income tracking) -->
  <g filter="url(#shadow)">
    <!-- Bar 1 -->
    <rect x="148" y="120" width="22" height="40" rx="4" fill="url(#bar1)" opacity="0.9"/>
    <!-- Bar 2 -->
    <rect x="178" y="90" width="22" height="70" rx="4" fill="url(#bar2)" opacity="0.9"/>
    <!-- Bar 3 -->
    <rect x="208" y="65" width="22" height="95" rx="4" fill="url(#bar3)" opacity="0.9"/>
  </g>

  <!-- Growth arrow -->
  <g transform="translate(140, 55)" filter="url(#shadow)">
    <path d="M 0 30 L 55 30" stroke="white" stroke-width="2.5" stroke-linecap="round" opacity="0.4"/>
    <polyline points="45,22 55,30 45,38" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.4"/>
  </g>

  <!-- Bottom text -->
  <text x="120" y="200" text-anchor="middle" fill="white" font-size="14" font-weight="700" font-family="Microsoft YaHei, sans-serif" letter-spacing="3">环 宇 视 野</text>
  <text x="120" y="220" text-anchor="middle" fill="#64748b" font-size="10" font-family="Microsoft YaHei, sans-serif">记账系统</text>
</svg>
