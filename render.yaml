services:
  - type: web
    name: ad-agency-accounting
    env: node
    buildCommand: npm install && cd server && npm install && cd .. && npx vite build
    startCommand: cd server && npx tsx src/index.ts
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: ad-accounting-db
          property: connectionString
      - key: NODE_VERSION
        value: 20.x

databases:
  - name: ad-accounting-db
    databaseName: ad_accounting
    plan: free
